name: Update AIPAC donation total

on:
  schedule:
    # Run every hour at minute 15
    - cron: '15 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch FEC data
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python scripts/fetch_fec.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/total.json data/candidates.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update donation data [automated]"
            # Pull any new remote commits before pushing (avoids rejected push)
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
          fi
