<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Races – Pro-Israel PAC Spending 2026</title>
  <meta name="description" content="U.S. congressional and presidential races ranked by total pro-Israel PAC investment in 2026.">
  <meta property="og:title" content="Races Ranked by Pro-Israel PAC Investment 2026">
  <meta property="og:description" content="See which races pro-Israel PACs are most invested in for the 2026 election cycle.">
  <meta property="og:type" content="website">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem 1.5rem;
      background: #141414;
      border-bottom: 1px solid #282828;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .nav a { color: #777; text-decoration: none; transition: color 0.2s; }
    .nav a:hover { color: #e0e0e0; }
    .nav a.active { color: #e0e0e0; border-bottom: 2px solid #6fbf73; padding-bottom: 2px; }
    .nav .sep { color: #333; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      text-align: center;
      color: #777;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 180px;
      padding: 0.6rem 1rem;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .search-input::placeholder { color: #555; }
    .search-input:focus { border-color: #6fbf73; }

    .filter-select {
      padding: 0.6rem 0.75rem;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }
    .filter-select:focus { border-color: #6fbf73; }

    .results-count {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 1rem;
    }

    /* === RACE LIST === */
    .race-list { list-style: none; }

    .race-item {
      background: #1e1e1e;
      border: 1px solid #282828;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .race-item:hover { border-color: #3a3a3a; }

    .race-row {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      gap: 0.75rem;
      user-select: none;
    }

    .rank {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      min-width: 2rem;
      text-align: right;
    }

    .race-info { flex: 1; min-width: 0; }

    .race-label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .race-meta {
      font-size: 0.75rem;
      color: #777;
      margin-top: 2px;
    }

    .office-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 4px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .office-H { background: #2a2a4a; color: #8888cc; }
    .office-S { background: #3a2a1a; color: #cc9944; }
    .office-P { background: #2a1a3a; color: #aa77cc; }

    .race-amount {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: #6fbf73;
      white-space: nowrap;
    }

    .expand-icon {
      color: #444;
      font-size: 0.8rem;
      transition: transform 0.2s;
    }
    .race-item.open .expand-icon { transform: rotate(90deg); }

    /* === CANDIDATE DETAIL (expanded) === */
    .race-detail {
      display: none;
      padding: 0 1rem 0.75rem 3.75rem;
      border-top: 1px solid #282828;
    }
    .race-item.open .race-detail { display: block; }

    .detail-title {
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
      padding-top: 0.6rem;
    }

    .candidate-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      padding: 0.25rem 0;
      color: #999;
    }
    .candidate-line-name { display: flex; align-items: center; gap: 0.4rem; }
    .candidate-line .cl-amount { color: #bbb; font-family: 'Oswald', sans-serif; }

    .ie-labels { margin-top: 2px; }
    .ie-tag {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0px 4px;
      border-radius: 2px;
      margin-right: 4px;
    }
    .ie-support-tag { background: #1a3a1a; color: #6fbf73; }
    .ie-oppose-tag { background: #3a1a1a; color: #e07070; }

    .party-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 0px 4px;
      border-radius: 2px;
      letter-spacing: 0.03em;
    }
    .party-DEM { background: #1a3a6b; color: #5b9bd5; }
    .party-REP { background: #5a1a1a; color: #e07070; }
    .party-LIB { background: #4a3a0a; color: #d4b94a; }
    .party-GRE { background: #1a3a1a; color: #6fbf73; }
    .party-IND { background: #3a3a3a; color: #aaa; }
    .party-other { background: #2a2a2a; color: #888; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #555;
      font-size: 0.9rem;
    }

    .updated {
      font-size: 0.8rem;
      color: #555;
      margin-top: 2rem;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .error-msg {
      color: #e57373;
      font-size: 0.9rem;
      margin-top: 1rem;
      text-align: center;
      display: none;
    }

    @media (max-width: 600px) {
      .container { padding: 1.5rem 0.75rem; }
      .race-row { padding: 0.6rem 0.75rem; gap: 0.5rem; }
      .rank { min-width: 1.5rem; font-size: 0.75rem; }
      .race-label { font-size: 0.85rem; }
      .race-amount { font-size: 0.9rem; }
      .race-detail { padding-left: 2.5rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html">Counter</a>
    <span class="sep">|</span>
    <a href="candidates.html">Candidates</a>
    <span class="sep">|</span>
    <a href="races.html" class="active">Races</a>
  </nav>

  <div class="container">
    <h1>Races Ranked by Pro-Israel PAC Investment</h1>
    <p class="page-subtitle">2026 election cycle &middot; where are they spending the most?</p>

    <div class="controls">
      <input type="text" class="search-input" id="search" placeholder="Search by state or district...">
      <select class="filter-select" id="state-filter">
        <option value="">All States</option>
      </select>
      <select class="filter-select" id="chamber-filter">
        <option value="">All Chambers</option>
        <option value="H">House</option>
        <option value="S">Senate</option>
        <option value="P">President</option>
      </select>
    </div>

    <p class="results-count" id="results-count"></p>

    <ul class="race-list" id="race-list"></ul>
    <div class="empty-state" id="empty" style="display:none;">No races match your filters.</div>

    <p class="updated" id="updated"></p>
    <p class="error-msg" id="error"></p>
  </div>

  <script src="races.js"></script>
</body>
</html>
